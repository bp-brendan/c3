<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagged | The Visualist</title>
  <link rel="icon" href="visualist-favicon.png" type="image/png">
  <link rel="preconnect" href="https://avxlexkqcxamixyhyxcd.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="stylesheet" href="https://use.typekit.net/orw0adz.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="components.js"></script>
  <script src="cardthumbs.js"></script>
</head>
<body data-page="tag">

  <header class="site-header" data-visualist-header></header>

  <main class="site-main tag-page">
    <div data-visualist-nav></div>
    <h1 class="tag-title"><span id="tag-name"></span><span class="tag-count" id="tag-count"></span></h1>
    <div class="archive-listing" id="tag-results"><p style="text-align:center; padding: 20px;">Loading&hellip;</p></div>
    <p class="view-empty" id="tag-empty" hidden>No 2026 events carry this tag.</p>
  </main>

  <footer class="site-footer" data-visualist-footer></footer>

  <!-- chrome will render inside loadData to ensure Supabase taglines are ready -->
  <script>
    // the virtual today page is the nav's TODAY destination
    if (new URLSearchParams(location.search).get('tag') === 'today') {
      document.body.dataset.activeNav = 'today';
    }
  </script>
  <script src="tags2026.js"></script>

  <!-- Events loaded dynamically via supabaseClient.js -->
  <script>
  Visualist.loadData(async () => {
    Visualist.renderChrome();
    Visualist.initHeaderAccordion();
    const pageParams = new URLSearchParams(location.search);
    const slug = pageParams.get('tag') || '';
    // "today" and "tomorrow" are virtual tags: everything opening or on view then, always current
    const isTodayPage = slug === 'today';
    const isTomorrowPage = slug === 'tomorrow';
    // "top-v" is virtual too: picks live in the top_pick column, not in tags
    const isTopVPage = slug === 'top-v';
    // a month page (?month=2026-06) lists that month's events, archive-style
    const monthParam = pageParams.get('month') || '';
    const isMonthPage = /^\d{4}-\d{2}$/.test(monthParam);
    const monthLabel = isMonthPage
      ? new Date(`${monthParam}-15T12:00:00`).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })
      : '';
    const tag = TAGS_2026.find(t => t.s === slug);
    const label = isTodayPage ? 'Today'
      : (isTomorrowPage ? 'Tomorrow'
        : (isTopVPage ? 'Top V'
          : (isMonthPage ? monthLabel : (tag ? tag.n : Visualist.tagLabel(slug || 'unknown')))));
    const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    document.getElementById('tag-name').textContent = label;
    document.title = isTodayPage ? 'Today | The Visualist'
      : (isMonthPage ? `${monthLabel} | The Visualist` : `Tagged: ${label} | The Visualist`);
    // the Today listing is the landing page: it opens straight onto the
    // day-and-date heading, like a This Week day group
    if (isTodayPage) document.querySelector('.tag-title').remove();

    Visualist.trackEventLinks(() => ({
      label: (isTodayPage || isTomorrowPage || isMonthPage) ? label : `Tagged “${label}”`,
      nav: 'archive',
      href: isMonthPage
        ? `tag.html?month=${encodeURIComponent(monthParam)}`
        : `tag.html?tag=${encodeURIComponent(slug)}`
    }));

    const today = Visualist.todayIso();
    const tomorrow = Visualist.tomorrowIso();
    // a day page lists only what is happening that day: an event that is
    // merely running through the day belongs to its own dates and to the
    // series' tag page, not to Today
    const dayIso = isTodayPage ? today : (isTomorrowPage ? tomorrow : '');

    let hits = [];
    document.getElementById('tag-results').innerHTML = '<p style="text-align:center; padding: 20px;">Loading archive...</p>';

    const mapEvent = e => ({
      id: e.id,
      t: e.title,
      u: e.permalink,
      p: e.path,
      v: e.venue,
      d: e.event_date,
      i: e.image_url,
      x: e.excerpt !== undefined ? e.excerpt : e.description,
      g: e.tags || [],
      w: e.time_window,
      vu: e.venue_url,
      a: e.address,
      m: e.map_url,
      o: e.on_view_through,
      k: e.top_pick ? 1 : 0,
      sf: e.series_first == null ? undefined : (e.series_first ? 1 : 0),
      sl: e.series_last == null ? undefined : (e.series_last ? 1 : 0)
    });

    if (isTodayPage || isTomorrowPage) {
      const dayQuery = table => {
        let query = window.supabaseClient
          .from(table)
          .select('*')
          .eq('event_date', dayIso)
          .order('title', { ascending: true })
          .limit(100);
        if (window.SITE_SETTINGS && window.SITE_SETTINGS.limit_to_2026) {
          query = query.gte('event_date', '2026-01-01').lte('event_date', '2026-12-31');
        }
        return query;
      };
      let { data, error } = await dayQuery('events_list');
      if (error || !data) ({ data, error } = await dayQuery('events'));
      if (!error && data) {
        hits = Visualist.publicEvents(data.map(mapEvent))
          .sort((a, b) => (a.t || '').localeCompare(b.t || ''));
      }
    } else {
      // Month or Tag: query the deep archive directly, via the light
      // events_list view (plain-text excerpts); the full table is the
      // fallback if the view is missing
      const deepQuery = table => {
        let query = window.supabaseClient.from(table).select('*').limit(1000);
        if (isMonthPage) {
          // exclusive next-month bound: a literal "-31" is an invalid date for
          // short months and errors the whole query (blank Feb/Apr/Jun/Sep/Nov)
          const [year, month] = monthParam.split('-').map(Number);
          const nextMonth = `${month === 12 ? year + 1 : year}-${String(month === 12 ? 1 : month + 1).padStart(2, '0')}-01`;
          query = query.gte('event_date', `${monthParam}-01`).lt('event_date', nextMonth).order('event_date', { ascending: true });
        } else if (isTopVPage) {
          query = query.eq('top_pick', true).order('event_date', { ascending: false });
        } else {
          // events store the human-readable tag label ("Chicago", "Hyde Park"),
          // but the URL slug is lowercased and hyphenated. PostgREST array
          // containment is exact and case-sensitive, so match any plausible
          // stored form — exact label, Title Case, spaced lowercase, raw slug —
          // or capitalized/multi-word tags return nothing (tag pages showed 0).
          const spaced = slug.replace(/-/g, ' ');
          const titleCase = spaced.replace(/\b\w/g, ch => ch.toUpperCase());
          const candidates = [...new Set(
            [Visualist.tagLabel(slug), titleCase, spaced, slug].filter(Boolean)
          )];
          const orFilter = candidates
            .map(v => `tags.cs.{"${String(v).replace(/\\/g, '\\\\').replace(/"/g, '\\"')}"}`)
            .join(',');
          query = query.or(orFilter).order('event_date', { ascending: false });
        }
        if (window.SITE_SETTINGS && window.SITE_SETTINGS.limit_to_2026) {
          query = query.gte('event_date', '2026-01-01').lte('event_date', '2026-12-31');
        }
        return query;
      };

      let { data, error } = await deepQuery('events_list');
      if (error || !data) ({ data, error } = await deepQuery('events'));
      if (!error && data) {
         hits = data.map(mapEvent);

          hits = Visualist.publicEvents(hits).sort((a, b) => isMonthPage
            ? a.d.localeCompare(b.d) || (a.t || '').localeCompare(b.t || '') // months read chronologically
            : b.d.localeCompare(a.d));
      }
    }
    
    const tagCount = document.getElementById('tag-count');
    if (tagCount) tagCount.textContent = `(${hits.length} event${hits.length === 1 ? '' : 's'})`;

    if (hits.length) {
      const ordinalDay = n => {
        const teen = n % 100;
        if (teen >= 11 && teen <= 13) return `${n}th`;
        return `${n}${['th', 'st', 'nd', 'rd'][n % 10] || 'th'}`;
      };
      const openingLine = e => {
        const date = new Date(`${e.d}T12:00:00`);
        const weekday = date.toLocaleDateString('en-US', { weekday: 'long' });
        const month = date.toLocaleDateString('en-US', { month: 'long' });
        let line = `Opening ${weekday}, ${month} ${ordinalDay(date.getDate())}`;
        // parseable times become their own Start/End row instead of a tail
        if (e.w && !Visualist.timeBounds(e.w)) {
          line += e.w.includes('–') ? `, from ${e.w}` : `, at ${e.w}`;
        }
        return line;
      };
      const renderTags = tagSlugs => {
        const tags = [...new Set(tagSlugs || [])].slice(0, 4);
        if (!tags.length) return '';
        return `<span class="listing-tags">${tags.map(tagSlug =>
          `<a href="tag.html?tag=${encodeURIComponent(Visualist.tagSlug(tagSlug))}">${escapeHtml(Visualist.tagLabel(tagSlug))}</a>`
        ).join('')}</span>`;
      };
      let lastDate = '';
      document.getElementById('tag-results').innerHTML =
        (dayIso ? Visualist.dayHeadingHtml(dayIso) : '') + hits.map(e => `
        ${!dayIso && e.d !== lastDate ? Visualist.dayHeadingHtml(lastDate = e.d) : ''}
        <article class="event-card">
          ${e.i
            ? `<a class="event-thumb" href="${escapeHtml(Visualist.eventHref(e))}"><img src="${escapeHtml(e.i)}" alt="" loading="lazy" decoding="async" fetchpriority="low"></a>`
            : ''}
          <div class="event-info">
            <h3 class="event-title"><a href="${escapeHtml(Visualist.eventHref(e))}">${escapeHtml(e.t || 'Untitled')}</a>${e.k ? ' <a class="top-pick" href="tag.html?tag=top-v">Top V</a>' : ''}${Visualist.seriesPillsHtml(e)}</h3>
            ${(e.v || e.a || e.d || e.o) ? `<div class="event-meta-grid">
              ${(e.v || e.a) ? `<div class="event-location">
                ${e.v ? `<p class="event-venue"><a href="${escapeHtml(e.vu || e.p || e.u)}"${e.vu ? ' target="_blank" rel="noopener"' : ''}>${escapeHtml(e.v)}</a></p>` : ''}
                ${e.a ? `<p class="event-address">${e.m ? `<a href="${escapeHtml(e.m)}" target="_blank" rel="noopener">${escapeHtml(e.a)}</a>` : escapeHtml(e.a)}</p>` : ''}
              </div>` : ''}
              <div class="event-schedule">
                ${Visualist.startEndWhenHtml(Visualist.timeBounds(e.w))}
                <p class="event-when">${Visualist.scheduleLineHtml(openingLine(e))}</p>
                ${Visualist.onViewHtml(e)}
              </div>
            </div>` : ''}
            ${Visualist.excerptHtml(e.x, Visualist.eventHref(e))}
            ${renderTags(e.g)}
            <div class="event-liner"></div>
          </div>
        </article>`).join('');
    } else if (isTodayPage || isTomorrowPage) {
      // a quiet day: invite the reader onward instead of a bare empty note
      document.getElementById('tag-results').innerHTML = `
        ${Visualist.dayHeadingHtml(dayIso)}
        <div class="day-empty">
          <p class="day-empty-lede">Nothing opening ${isTodayPage ? 'today' : 'tomorrow'}.</p>
          <div class="day-empty-actions">
            <a href="index.html#this-week">See what&rsquo;s happening this week</a>
            <a href="index.html#archive">Explore the archive</a>
          </div>
        </div>`;
    } else {
      document.getElementById('tag-empty').hidden = false;
    }

  }, { events: false });
  </script>

</body>
</html>
