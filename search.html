<!DOCTYPE html>
<html lang="en">
<head>\n  <meta name="theme-color" content="#1c1c1c">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | The Visualist</title>
  <link rel="icon" href="visualist-favicon.png" type="image/png">
  <link rel="preconnect" href="https://avxlexkqcxamixyhyxcd.supabase.co">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://use.typekit.net">
  <link rel="stylesheet" href="https://use.typekit.net/orw0adz.css">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="components.js"></script>
  <script src="cardthumbs.js"></script>
</head>
<body data-page="search" data-active-nav="archive">

  <header class="site-header" data-visualist-header></header>

  <main class="site-main tag-page">
    <div data-visualist-nav></div>
    <h1 class="tag-title"><span id="search-term"></span><span class="tag-count" id="search-count"></span></h1>
    <div class="archive-listing" id="search-results"></div>
    <p class="view-empty" id="search-empty" hidden>No 2026 events match this search.</p>
  </main>

  <footer class="site-footer" data-visualist-footer></footer>

  <!-- chrome will render inside loadData to ensure Supabase taglines are ready -->
  <script src="tags2026.js"></script>
  <!-- Events loaded dynamically via supabaseClient.js -->
  <script>
  Visualist.loadData(async () => {
    Visualist.renderChrome();
    Visualist.initHeaderAccordion();
    const q = (new URLSearchParams(location.search).get('q') || '').trim();
    const escapeHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    document.getElementById('search-term').textContent = q ? `“${q}”` : 'Search';
    document.title = q ? `Search: ${q} | The Visualist` : 'Search | The Visualist';

    Visualist.trackEventLinks(() => ({
      label: `Search “${q}”`,
      nav: 'archive',
      href: `search.html?q=${encodeURIComponent(q)}`
    }));

    const norm = q.toLowerCase();
    let hits = [];
    
    if (norm) {
      document.getElementById('search-results').innerHTML = '<p style="text-align:center; padding: 20px;">Searching deep archive...</p>';
      document.getElementById('search-empty').hidden = true;
      
      let query = window.supabaseClient
        .from('events')
        .select('*')
        .or(`title.ilike.%${norm}%,venue.ilike.%${norm}%,description.ilike.%${norm}%`)
        .order('event_date', { ascending: false })
        .limit(1000);
        
      if (window.SITE_SETTINGS && window.SITE_SETTINGS.limit_to_2026) {
        query = query.gte('event_date', '2026-01-01').lte('event_date', '2026-12-31');
      }
        
      const { data, error } = await query;
        
      if (!error && data) {
         hits = data.map(e => ({
            id: e.id,
            t: e.title,
            u: e.permalink,
            p: e.path,
            v: e.venue,
            d: e.event_date,
            i: e.image_url,
            x: e.description,
            g: e.tags || [],
            w: e.time_window,
            vu: e.venue_url,
            a: e.address,
            m: e.map_url,
            o: e.on_view_through,
            k: e.top_pick ? 1 : 0,
            sf: e.series_first == null ? undefined : (e.series_first ? 1 : 0),
            sl: e.series_last == null ? undefined : (e.series_last ? 1 : 0)
          }));
         hits = Visualist.normalizeEvents(hits);
      }
    }

    document.getElementById('search-count').textContent = `(${hits.length})`;

    if (hits.length) {
      const ordinalDay = n => {
        const teen = n % 100;
        if (teen >= 11 && teen <= 13) return `${n}th`;
        return `${n}${['th', 'st', 'nd', 'rd'][n % 10] || 'th'}`;
      };
      const openingLine = event => {
        const date = new Date(`${event.d}T12:00:00`);
        const weekday = date.toLocaleDateString('en-US', { weekday: 'long' });
        const month = date.toLocaleDateString('en-US', { month: 'long' });
        let line = `Opening ${weekday}, ${month} ${ordinalDay(date.getDate())}`;
        if (event.w && !Visualist.timeBounds(event.w)) {
          line += event.w.includes('–') ? `, from ${event.w}` : `, at ${event.w}`;
        }
        return line;
      };
      const slugForTag = label => {
        const normalized = label.trim().toLowerCase();
        const tag = TAGS_2026.find(item =>
          item.n.toLowerCase() === normalized || item.s.toLowerCase() === normalized
        );
        return tag ? tag.s : Visualist.tagSlug(label);
      };
      const renderTags = tags => {
        const linked = (tags || [])
          .map(tag => ({ label: Visualist.tagLabel(tag), slug: slugForTag(tag) }))
          .filter(tag => tag.slug)
          .slice(0, 4);
        if (!linked.length) return '';
        return `<span class="listing-tags">${linked.map(tag =>
          `<a href="tag.html?tag=${encodeURIComponent(tag.slug)}">${escapeHtml(tag.label)}</a>`
        ).join('')}</span>`;
      };
      document.getElementById('search-results').innerHTML = hits.map(event => `
        <article class="event-card">
          ${event.i
            ? `<a class="event-thumb" href="${escapeHtml(Visualist.eventHref(event))}"><img src="${escapeHtml(event.i)}" alt="" loading="lazy" decoding="async" fetchpriority="low"></a>`
            : ''}
          <div class="event-info">
            <h3 class="event-title"><a href="${escapeHtml(Visualist.eventHref(event))}">${escapeHtml(event.t || 'Untitled')}</a>${event.k ? ' <a class="top-pick" href="tag.html?tag=top-v">Top V</a>' : ''}${Visualist.seriesPillsHtml(event)}</h3>
            ${(event.v || event.a || event.d || event.o) ? `<div class="event-meta-grid">
              ${(event.v || event.a) ? `<div class="event-location">
                ${event.v ? `<p class="event-venue"><a href="${escapeHtml(event.vu || event.p || event.u)}"${event.vu ? ' target="_blank" rel="noopener"' : ''}>${escapeHtml(event.v)}</a></p>` : ''}
                ${event.a ? `<p class="event-address">${event.m ? `<a href="${escapeHtml(event.m)}" target="_blank" rel="noopener">${escapeHtml(event.a)}</a>` : escapeHtml(event.a)}</p>` : ''}
              </div>` : ''}
              <div class="event-schedule">
                ${Visualist.startEndWhenHtml(Visualist.timeBounds(event.w))}
                <p class="event-when">${Visualist.scheduleLineHtml(openingLine(event))}</p>
                ${Visualist.onViewHtml(event)}
              </div>
            </div>` : ''}
            ${Visualist.excerptHtml(event.x, Visualist.eventHref(event))}
            ${renderTags(event.g)}
            <div class="event-liner"></div>
          </div>
        </article>
      `).join('');
    } else {
      document.getElementById('search-empty').hidden = false;
    }
  }, { events: false });
  </script>

</body>
</html>
